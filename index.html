<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnstile Test</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #eee;
            padding: 20px;
        }
        .container {
            background: #16213e;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status.success {
            background: #1b4d3e;
            color: #4ade80;
            display: block;
        }
        .status.error {
            background: #4a1b1b;
            color: #f87171;
            display: block;
        }
        .cf-turnstile {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cloudflare Turnstile</h1>
        <p>Captcha de test</p>
        
        <div class="cf-turnstile" 
             data-sitekey="0x4AAAAAACtZTVsG2AMyMugC"
             data-callback="onSuccess"
             data-error-callback="onError"
             data-expired-callback="onExpired">
        </div>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        function onSuccess(token) {
            const status = document.getElementById('status');
            status.className = 'status success';
            status.textContent = '✓ Token généré: ' + token.substring(0, 20) + '...';
            console.log('Token:', token);
        }
        
        function onError() {
            const status = document.getElementById('status');
            status.className = 'status error';
            status.textContent = '✗ Erreur lors de la vérification';
        }
        
        function onExpired() {
            const status = document.getElementById('status');
            status.className = 'status error';
            status.textContent = '⚠ Token expiré';
        }
    </script>
</body>
</html>
